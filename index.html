<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed</title>

<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<div class="feed-wrapper">
    <input type="text" id="searchInput" placeholder="Search posts or content...">
    <div id="feeds"></div>
</div>

<!-- Comment Modal -->
<div id="comment-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeCommentModal()">✖</button>
        <div id="modal-comments"></div>
    </div>

    <div class="comment-box-inp">
        <input type="text" id="modal-comment-input" placeholder="Write a comment...">
        <button class="send-comment-btn" onclick="submitModalComment()">Send</button>
    </div>
</div>

<!-- Scripts -->
<script src="./js/api.js"></script>
<script src="./js/app.js"></script>
<script src="./js/navbar.js"></script>
<script src="./js/feed.js"></script>
<script src="./js/posts.js"></script>

<script>
loadNavbar();
loadPosts();
</script>

</body>
</html>
