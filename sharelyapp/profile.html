<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="navbar"></div>

<div class="profile-wrapper">

<button class="edit-profile" id="edit-btn" name="edit">Edit</button>

<!-- Hidden Form -->
<div id="edit-form" class="edit-form">
<input type="text" id="username-input" placeholder="Username">
<textarea id="bio-input" placeholder="Bio"></textarea>
<input type="file" id="profile-image">

<button id="update-btn">Update</button>
</div>

<div class="profile-header">

<div class="profile-image">
<img id="user-profile" />
</div>

<div class="profile-info">
<h2 id="username-profile"></h2>
<h3 id="bio"></h3>
<p id="email"></p>

<div class="profile-stats">
<div>
<strong id="post-count">0</strong>
<span>Posts</span>
</div>
</div>

</div>
</div>

<div class="profile-posts">
<h3>Your Posts</h3>

<button type="button" id="goto-post" onclick="gottopost()">
Wanna Post ?
</button>

<div id="post"></div>

</div>
</div>

<!-- Comment Modal (from base.html) -->
<div id="comment-modal" class="modal-overlay">
<div class="modal-content">
<button class="close-btn" onclick="closeCommentModal()">✖</button>
<div id="modal-comments"></div>
</div>

<div class="comment-box-inp">
<input type="text" id="modal-comment-input" placeholder="Write a comment...">
<button class="send-comment-btn" onclick="submitModalComment()">Send</button>
</div>
</div>

<!-- Scripts -->
<script src="./js/app.js"></script>
<script src="./js/api.js"></script>
<script src="./js/navbar.js"></script>
<script src="./js/posts.js" defer></script>
<script src="./js/profile.js" defer></script>
<script src="./js/feed.js" defer></script>
<script src="./js/create.js"></script>

<script>
loadNavbar();
</script>

</body>
</html>
