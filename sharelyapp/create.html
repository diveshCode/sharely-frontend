<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create a Post</title>

<link rel="stylesheet" href="./css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div id="navbar"></div>

<div class="create-container">
    <div class="create-card">
        <h2>Create New Post</h2>

        <input type="text" id="title" placeholder="Post Title">

        <textarea id="content" placeholder="Write something..."></textarea>

        <div class="upload-section">
            <label>Upload Image</label>
            <input type="file" id="image" accept="image/*">
        </div>

        <div class="upload-section">
            <label>Upload Video</label>
            <input type="file" id="video" accept="video/*">
        </div>

        <button type="button" id="post-btn">Post</button>

        <p id="post-message"></p>
    </div>
</div>

<!-- Comment Modal (from base.html) -->
<div id="comment-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeCommentModal()">✖</button>
        <div id="modal-comments"></div>
    </div>

    <div class="comment-box-inp">
        <input type="text" id="modal-comment-input" placeholder="Write a comment...">
        <button class="send-comment-btn" onclick="submitModalComment()">Send</button>
    </div>
</div>

<!-- Scripts -->
<script src="./js/api.js"></script>
<script src="./js/app.js"></script>
<script src="./js/feed.js"></script>
<script src="./js/navbar.js"></script>
<script src="./js/create.js"></script>

<script>
loadNavbar();
</script>

</body>
</html>
